<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>나만의 주간 계획표</title>
  <link rel="apple-touch-icon" href="https://img.icons8.com/fluent/192/000000/calendar-external.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // 회원님의 전용 파이어베이스 열쇠
    const firebaseConfig = {
      apiKey: "AIzaSyDfzB3U15Rktb0o6G2criirh5WcrVfJBEw",
      authDomain: "my-weekly-planner-869f1.firebaseapp.com",
      projectId: "my-weekly-planner-869f1",
      storageBucket: "my-weekly-planner-869f1.firebasestorage.app",
      messagingSenderId: "540596602034",
      appId: "1:540596602034:web:a10d8aa7085a7c6b0475ab"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();

    const CheckIcon = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-3 h-3"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" /></svg>;
    const PlusIcon = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" /></svg>;
    const TrashIcon = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>;
    const SpinnerIcon = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4 animate-spin mr-1"><path strokeLinecap="round" strokeLinejoin="round" d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83" /></svg>;
    const CloudIcon = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4 text-green-500"><path strokeLinecap="round" strokeLinejoin="round" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" /></svg>;

    const getWeatherInfo = (code) => {
      if (code === undefined || code === null) return { icon: '❓', text: '알 수 없음' };
      if (code === 0) return { icon: '☀️', text: '맑음' };
      if (code === 1 || code === 2) return { icon: '⛅', text: '구름 조금' };
      if (code === 3) return { icon: '☁️', text: '흐림' };
      if (code >= 45 && code <= 48) return { icon: '🌫️', text: '안개' };
      if (code >= 51 && code <= 67) return { icon: '🌧️', text: '비' };
      if (code >= 71 && code <= 77) return { icon: '❄️', text: '눈' };
      if (code >= 80 && code <= 82) return { icon: '🌦️', text: '소나기' };
      if (code >= 95 && code <= 99) return { icon: '⛈️', text: '뇌우' };
      return { icon: '🌤️', text: '맑음' };
    };

    const DAY_NAMES = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];

    // 시차 버그 해결을 위해 세계 표준시가 아닌 '한국 로컬 날짜 문자열'을 직접 생성하는 방식으로 수정
    const formatDateToLocalString = (dateObj) => {
      const year = dateObj.getFullYear();
      const month = String(dateObj.getMonth() + 1).padStart(2, '0');
      const day = String(dateObj.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    };

    const getWeekDates = () => {
      const today = new Date();
      const dayOfWeek = today.getDay();
      const diffToMonday = dayOfWeek === 0 ? -6 : 1 - dayOfWeek; 
      const monday = new Date(today);
      monday.setDate(today.getDate() + diffToMonday);

      const week = [];
      for (let i = 0; i < 7; i++) {
        const date = new Date(monday);
        date.setDate(monday.getDate() + i);
        week.push({
          date,
          dateString: formatDateToLocalString(date), // 여기를 수정했습니다!
          dayName: DAY_NAMES[date.getDay()],
          shortDate: `${date.getMonth() + 1}/${date.getDate()}`
        });
      }
      return week;
    };

    function App() {
      const [weekDates, setWeekDates] = useState([]);
      const [weatherData, setWeatherData] = useState({});
      const [todos, setTodos] = useState({});
      const [loadingWeather, setLoadingWeather] = useState(true);
      const [user, setUser] = useState(null);
      const [isSaving, setIsSaving] = useState(false);

      useEffect(() => {
        const dates = getWeekDates();
        setWeekDates(dates);
        
        const fetchWeather = async () => {
          try {
            const response = await fetch(
              `https://api.open-meteo.com/v1/forecast?latitude=37.5665&longitude=126.9780&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Asia%2FSeoul&start_date=${dates[0].dateString}&end_date=${dates[6].dateString}`
            );
            const data = await response.json();
            const weatherMap = {};
            if (data.daily) {
              data.daily.time.forEach((dateStr, index) => {
                weatherMap[dateStr] = {
                  code: data.daily.weathercode[index],
                  maxTemp: Math.round(data.daily.temperature_2m_max[index]),
                  minTemp: Math.round(data.daily.temperature_2m_min[index]),
                };
              });
            }
            setWeatherData(weatherMap);
          } catch (error) {
            console.error("날씨 정보 오류:", error);
          } finally {
            setLoadingWeather(false);
          }
        };
        fetchWeather();

        auth.signInAnonymously().catch(console.error);
        const unsubscribe = auth.onAuthStateChanged(setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        const docRef = db.collection('users').doc(user.uid).collection('weekly_planner').doc('my_data');
        const unsubscribe = docRef.onSnapshot((docSnap) => {
          if (docSnap.exists()) setTodos(docSnap.data().todos || {});
          else setTodos({}); 
        });
        return () => unsubscribe();
      }, [user]);

      const saveToDatabase = async (newTodos) => {
        setTodos(newTodos); 
        if (!user) return;
        setIsSaving(true);
        try {
          const docRef = db.collection('users').doc(user.uid).collection('weekly_planner').doc('my_data');
          await docRef.set({ todos: newTodos }, { merge: true });
        } catch (error) {
          console.error("저장 실패:", error);
        } finally {
          setTimeout(() => setIsSaving(false), 500);
        }
      };

      const handleAddTodo = (dateString, text) => {
        if (!text.trim()) return;
        saveToDatabase({ ...todos, [dateString]: [...(todos[dateString] || []), { id: Date.now(), text, completed: false }] });
      };

      const handleToggleTodo = (dateString, id) => {
        saveToDatabase({ ...todos, [dateString]: (todos[dateString] || []).map(todo => todo.id === id ? { ...todo, completed: !todo.completed } : todo) });
      };

      const handleDeleteTodo = (dateString, id) => {
        saveToDatabase({ ...todos, [dateString]: (todos[dateString] || []).filter(todo => todo.id !== id) });
      };

      // 오늘 날짜 계산도 한국 시간 기준으로 엄격하게 고정
      const todayStr = formatDateToLocalString(new Date());

      return (
        <div className="min-h-screen bg-gray-50 text-gray-800 p-4 md:p-8 font-sans pb-12 select-none">
          <div className="max-w-5xl mx-auto">
            <header className="mb-8 text-center md:text-left pt-4 flex flex-col md:flex-row md:justify-between md:items-end">
              <div>
                <h1 className="text-3xl font-bold text-gray-900 mb-2">이번 주 계획표</h1>
                <p className="text-gray-500 flex items-center justify-center md:justify-start gap-2">
                  {weekDates.length > 0 && `${weekDates[0].shortDate} ~ ${weekDates[6].shortDate}`}
                  {loadingWeather && <span className="flex items-center text-sm text-blue-500"><SpinnerIcon /> 날씨 연동중...</span>}
                </p>
              </div>
              <div className="mt-4 md:mt-0 flex items-center justify-center gap-2 text-sm text-gray-500 bg-white px-3 py-1.5 rounded-full shadow-sm border border-gray-100">
                {isSaving ? <span className="flex items-center"><SpinnerIcon /> 저장 중...</span> : <span className="flex items-center gap-1"><CloudIcon /> 클라우드 자동 저장 켜짐</span>}
              </div>
            </header>

            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 items-start pb-20">
              {weekDates.map((day) => {
                const weather = weatherData[day.dateString];
                const weatherInfo = getWeatherInfo(weather?.code);
                const dayTodos = todos[day.dateString] || [];
                const isToday = day.dateString === todayStr; // 오늘 날짜 체크 수정

                return (
                  <div key={day.dateString} className={`bg-white rounded-2xl shadow-sm border ${isToday ? 'border-blue-400 ring-2 ring-blue-50' : 'border-gray-100'} p-5 flex flex-col min-h-[250px]`}>
                    <div className="flex justify-between items-center mb-3 pb-2 border-b border-gray-50">
                      <div className="flex items-baseline gap-2">
                        <h2 className="text-lg font-semibold text-gray-800">{day.dayName}</h2>
                        <span className="text-xs text-gray-400">{day.shortDate}</span>
                      </div>
                      {weather ? (
                        <div className="flex items-center gap-1.5 text-sm font-medium bg-gray-50 px-2.5 py-1 rounded-full text-gray-600">
                          <span>{weatherInfo.icon}</span>
                          <span className="text-red-400">{weather.maxTemp}°</span>
                          <span className="text-gray-300">/</span>
                          <span className="text-blue-400">{weather.minTemp}°</span>
                        </div>
                      ) : (
                        <div className="text-gray-300">☁️</div>
                      )}
                    </div>

                    <div className="flex-1 space-y-0 mb-4">
                      {dayTodos.map(todo => (
                        <div key={todo.id} className="group flex items-start gap-2 p-1 -mx-1 rounded-lg active:bg-gray-50">
                          <button onClick={() => handleToggleTodo(day.dateString, todo.id)} className={`mt-0.5 flex-shrink-0 w-5 h-5 rounded-full border flex items-center justify-center ${todo.completed ? 'bg-green-500 border-green-500 text-white' : 'border-gray-300 text-transparent'}`}>
                            <CheckIcon />
                          </button>
                          <span className={`flex-1 text-sm leading-tight pt-1 break-all ${todo.completed ? 'text-gray-400 line-through' : 'text-gray-700'}`}>
                            {todo.text}
                          </span>
                          <button onClick={() => handleDeleteTodo(day.dateString, todo.id)} className="p-1 text-gray-300 hover:text-red-500 rounded-md">
                            <TrashIcon />
                          </button>
                        </div>
                      ))}
                    </div>

                    <form onSubmit={(e) => {
                      e.preventDefault();
                      const input = e.target.elements.todoInput;
                      handleAddTodo(day.dateString, input.value);
                      input.value = '';
                    }} className="mt-auto relative">
                      <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">-</span>
                      <input type="text" name="todoInput" placeholder="새 할 일 추가" autoComplete="off" className="w-full bg-gray-50 border border-transparent focus:border-blue-300 focus:bg-white rounded-xl py-2 pl-7 pr-10 text-sm outline-none" />
                      <button type="submit" className="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 text-gray-400">
                        <PlusIcon />
                      </button>
                    </form>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
